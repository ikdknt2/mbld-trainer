<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title> MBLD Trainer</title>

<link rel="icon" href="favicon.ico">

  
<style>

body{
  font-family:sans-serif;
}

  
/* 全体 */
.container{
  display:flex;
  gap:40px;
}

/* 左 */
.left{
  width:60%;
}

/* 右 */
.right{
  width:40%;
}

/* スクランブル */
#scramble{
  font-size:20px;
  margin:10px 0;
}

/* スクランブルリスト */
#scrambleList{
  margin-top:10px;
}

</style>
  
<link rel="stylesheet" href="style.css">

</head>


<body>

<header class="header">
<div class="logo"> 🧊 MBLD Trainer　</div>
</header>
  
<div class="container">

<!-- 左側 -->
<div class="left">

<div class="card">
<h3> Result Input</h3>

 Time
<input id="timeInput" type="text" placeholder="1:23.45">
  
 Solved
<input id="solvedInput" type="number" min="0">

 Attempted
<input id="attemptedInput" type="number" min="0">

 Penalty
<input id="penaltyInput" type="number" min="0" value="0">

<button onclick="saveTime()">Save</button>

</div>
<br><br> 

<div class="card">  
<h3> Generate Scrambles</h3>

<input id="scrambleCount" type="number" min="1" value="5">
<button onclick="generateManyScrambles()">Generate</button>
<button onclick="copyScrambles()">Copy Scramble</button>
<div id="scrambleList"></div> 

</div>
  
<div class="card">  
<h3> Export/Import </h3>
<div class=exportbox>
Export
<button onclick="exportCSV()">CSV Export</button> </div> <br>

<div class=importbox1>
Import
<input type="file" id="csvFile" accept=".csv"> </div>
<button onclick="importCSV()">CSV Import</button> <br>

</div>
  
</div>




<!-- 右側 -->
<div class="right">

<div class="card">
<h3>Statistics</h3>
<div id="pbSolved">No record</div>
<div id="pbPoint">No record</div>  
</div>
  
<div class="card">
<h3>Times</h3>

📶Sort :
<select id="sortMode" onchange="loadTimes()">
<option value="date">Date</option>
<option value="time">Time</option>
<option value="solved">Solved</option>
<option value="point">Point</option>
</select>
  
<div class="timeHeader">
<div class="colSolved">Solved</div>
<div class="colTime">Time</div>
<div class="colPoint">Point</div>
<div class="colButtons"></div>
</div>

<div id="timeList"></div>

</div>
</div>
  
</div>


<script src="scramble.js"></script>
<script src="generate.js"></script>
<script src="copy.js"></script>
<script src="db.js"></script>
<script src="csvim.js"></script>
<script src="csvex.js"></script>

</body>
</html>
